<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup 2026 Pool Leaderboard</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:20px}
.container{max-width:1200px;margin:auto}
.card{background:white;border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
button{padding:10px 16px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
.rank1{background:#fff7d6}.rank2{background:#f0f0f0}.rank3{background:#f7e3d6}
</style>

</head>

<body>
<div class="container">

<div class="card">
<h1>World Cup 2026 Pool</h1>
<p id="status">Pre-tournament — no matches played yet</p>
</div>

<div class="card">
<h2>Player Leaderboard</h2>
<table>
<thead>
<tr>
<th>Rank</th><th>Player</th><th>Seed</th><th>Match</th><th>Total</th>
</tr>
</thead>
<tbody id="leaderboard"></tbody>
</table>
</div>

<div class="card">
<h2>All 48 Teams</h2>
<table>
<thead>
<tr>
<th>Seed</th><th>Team</th><th>Owner</th><th>Match</th><th>Total</th>
</tr>
</thead>
<tbody id="teams"></tbody>
</table>
</div>

</div>

<script>

/* PLAYERS */
const PLAYERS = {
Scully:["Spain","USA","New Zealand"],
Bren:["France","Norway","Ghana"],
Mick:["Austria","Ivory Coast","Haiti"]
};

/* FULL SEED LIST */
const SEEDS = {
'France':1,'Spain':2,'Argentina':3,'England':4,'Portugal':5,'Brazil':6,'Netherlands':7,'Morocco':8,'Belgium':9,'Germany':10,
'Croatia':11,'Colombia':12,'Senegal':13,'Mexico':14,'USA':15,'Uruguay':16,'Japan':17,'Switzerland':18,'Iran':19,'Türkiye':20,
'Ecuador':21,'Austria':22,'South Korea':23,'Australia':24,'Algeria':25,'Egypt':26,'Canada':27,'Norway':28,'Panama':29,
'Ivory Coast':30,'Sweden':31,'Paraguay':32,'Czechia':33,'Scotland':34,'Tunisia':35,'DR Congo':36,'Uzbekistan':37,'Qatar':38,
'Iraq':39,'South Africa':40,'Saudi Arabia':41,'Jordan':42,'Bosnia & Herzegovina':43,'Cape Verde':44,'Ghana':45,'Curaçao':46,
'Haiti':47,'New Zealand':48
};

/* NO GAMES YET */
const MATCHES = [];  // ✅ FIX: empty = correct pre-tournament state

/* OWNER LOOKUP */
function owner(team){
for(const [p,teams] of Object.entries(PLAYERS)){
if(teams.includes(team)) return p;
}
return "";
}

/* MATCH SCORING */
function calculateMatches(){
const scores = {};
Object.keys(SEEDS).forEach(t=>{
scores[t] = {match:0};
});

/* no matches → all stay 0 */
return scores;
}

/* RENDER */
function render(){

const teamScores = calculateMatches();

/* TEAMS TABLE */
const teams = Object.keys(SEEDS).map(t=>{
const match = teamScores[t].match;
return {
team:t,
seed:SEEDS[t],
owner:owner(t),
match,
total:SEEDS[t] + match
};
});

document.getElementById("teams").innerHTML =
teams.sort((a,b)=>a.seed-b.seed).map(t=>`
<tr>
<td>${t.seed}</td>
<td>${t.team}</td>
<td>${t.owner}</td>
<td>${t.match}</td>
<td><b>${t.total}</b></td>
</tr>
`).join("");

/* PLAYERS TABLE */
const players = [];

for(const [name,list] of Object.entries(PLAYERS)){
let seed=0, match=0;

list.forEach(t=>{
seed += SEEDS[t];
match += 0; // ✅ no games yet
});

players.push({
name,
seed,
match,
total:seed + match
});
}

players.sort((a,b)=>b.total-a.total);

document.getElementById("leaderboard").innerHTML =
players.map((p,i)=>`
<tr class="rank${i+1}">
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.seed}</td>
<td>${p.match}</td>
<td><b>${p.total}</b></td>
</tr>
`).join("");

}

render();

</script>
</body>
</html>
