<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup Pool</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:20px}
.container{max-width:1000px;margin:auto}
.card{background:white;border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
.rank1{background:#fff7d6}.rank2{background:#f0f0f0}.rank3{background:#f7e3d6}
h1{margin:0}
.small{font-size:12px;color:#666}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>World Cup Pool</h1>
<p class="small">Seed + Match points (Win 8 / Draw 4 / Loss 0)</p>
</div>

<div class="card">
<h2>Player Leaderboard</h2>
<table>
<thead>
<tr>
<th>Rank</th><th>Player</th><th>Seed</th><th>Match</th><th>Total</th>
</tr>
</thead>
<tbody id="leaderboard"></tbody>
</table>
</div>

<div class="card">
<h2>Teams</h2>
<table>
<thead>
<tr>
<th>Team</th><th>Seed</th><th>Owner</th><th>Match Points</th><th>Total</th>
</tr>
</thead>
<tbody id="teams"></tbody>
</table>
</div>

</div>

<script>

/* PLAYERS (YOUR EXACT SETUP) */
const PLAYERS = {
  Scully: ["Spain","USA","New Zealand"],
  Bren: ["France","Norway","Ghana"],
  Mick: ["Austria","Ivory Coast","Haiti"]
};

/* FULL 48 SEEDS (CORRECT DATA YOU PROVIDED) */
const SEEDS = {
'France':1,'Spain':2,'Argentina':3,'England':4,'Portugal':5,'Brazil':6,'Netherlands':7,'Morocco':8,'Belgium':9,'Germany':10,
'Croatia':11,'Colombia':12,'Senegal':13,'Mexico':14,'USA':15,'Uruguay':16,'Japan':17,'Switzerland':18,'Iran':19,'Türkiye':20,
'Ecuador':21,'Austria':22,'South Korea':23,'Australia':24,'Algeria':25,'Egypt':26,'Canada':27,'Norway':28,'Panama':29,
'Ivory Coast':30,'Sweden':31,'Paraguay':32,'Czechia':33,'Scotland':34,'Tunisia':35,'DR Congo':36,'Uzbekistan':37,'Qatar':38,
'Iraq':39,'South Africa':40,'Saudi Arabia':41,'Jordan':42,'Bosnia & Herzegovina':43,'Cape Verde':44,'Ghana':45,'Curaçao':46,
'Haiti':47,'New Zealand':48
};

/* SAMPLE MATCH DATA (replace later with real feed if needed) */
const MATCHES = [
  {home:"France",away:"Brazil",home_score:2,away_score:1},
  {home:"Spain",away:"USA",home_score:1,away_score:1},
  {home:"Ghana",away:"Germany",home_score:0,away_score:3}
];

/* FIND OWNER */
function owner(team){
  for(const [p,teams] of Object.entries(PLAYERS)){
    if(teams.includes(team)) return p;
  }
  return "";
}

/* CORE SCORING (CORRECT + SIMPLE) */
function calculateMatches(){
  const scores = {};

  Object.keys(SEEDS).forEach(t=>{
    scores[t] = {match:0};
  });

  for(const m of MATCHES){
    const h=m.home, a=m.away;
    const hs=m.home_score, as=m.away_score;

    if(!SEEDS[h] || !SEEDS[a]) continue;

    if(hs>as) scores[h].match += 8;
    else if(as>hs) scores[a].match += 8;
    else {
      scores[h].match += 4;
      scores[a].match += 4;
    }
  }

  return scores;
}

/* RENDER */
function render(){

  const teamScores = calculateMatches();

  /* TEAMS TABLE */
  const teams = Object.keys(SEEDS).map(t=>{
    const match = teamScores[t]?.match || 0;
    return {
      team:t,
      seed:SEEDS[t],
      owner:owner(t),
      match,
      total:SEEDS[t] + match
    };
  });

  document.getElementById("teams").innerHTML =
    teams.sort((a,b)=>a.seed-b.seed)
    .map(t=>`
      <tr>
        <td>${t.team}</td>
        <td>${t.seed}</td>
        <td>${t.owner}</td>
        <td>${t.match}</td>
        <td><b>${t.total}</b></td>
      </tr>
    `).join("");

  /* PLAYER TABLE */
  const players = [];

  for(const [name,teamsList] of Object.entries(PLAYERS)){
    let seed=0, match=0;

    teamsList.forEach(t=>{
      seed += SEEDS[t];
      match += (teamScores[t]?.match || 0);
    });

    players.push({
      name,
      seed,
      match,
      total: seed + match
    });
  }

  players.sort((a,b)=>b.total-a.total);

  document.getElementById("leaderboard").innerHTML =
    players.map((p,i)=>`
      <tr class="rank${i+1}">
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td>${p.seed}</td>
        <td>${p.match}</td>
        <td><b>${p.total}</b></td>
      </tr>
    `).join("");
}

render();

</script>

</body>
</html>
