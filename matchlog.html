<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Match Log - World Cup 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {--gold-trim: #ffd9a3; --capsule-bg: rgba(0, 0, 0, 0.4);}
        body {font-family: 'Oswald', sans-serif; background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; color: #fff; margin: 0; padding: 40px 20px;}
        .container { max-width: 900px; margin: auto; }
        .luxury-panel { background: rgba(40, 25, 15, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 217, 163, 0.3); border-radius: 16px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); }
        .section-title { font-family: 'Cinzel', serif; text-align: center; color: var(--gold-trim); text-transform: uppercase; margin-bottom: 20px; }
        
        /* Updated to 6-Column Grid */
        .match-cols { display: grid; grid-template-columns: 2fr 1.2fr 1fr 0.5fr 1fr 0.5fr; align-items: center; text-align: center; gap: 8px; background: var(--capsule-bg); padding: 12px; border-radius: 8px; margin-bottom: 6px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .header-row { font-family: 'Cinzel', serif; font-weight: bold; color: #bca08d; font-size: 0.65rem; text-transform: uppercase; background: rgba(255, 217, 163, 0.1) !important; }
        
        .nav-button { background: rgba(140, 93, 67, 0.3); border: 1px solid var(--gold-trim); color: #f7dfc1; font-family: 'Cinzel', serif; font-size: 0.75rem; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; }
        .score-box { font-family: monospace; color: var(--gold-trim); font-weight: bold; }
        .owner-text { font-family: 'Cinzel', serif; font-size: 0.75rem; color: #ebd1be; }
    </style>
</head>
<body>
<div class="container">
    <div class="luxury-panel">
        <a href="index.html" class="nav-button">← Back</a>
        <div class="section-title">Full Match Log</div>
        <div class="match-cols header-row">
            <span>Match</span><span>HT / FT</span><span>HT OWNER</span><span>Pts</span><span>AT OWNER</span><span>Pts</span>
        </div>
        <div id="matchLog">Loading data...</div>
    </div>
</div>

<script>
const PLAYERS = { Gordon:['Brazil','Japan','Scotland'], David:['France','Norway','Bosnia & Herzegovina'], Stephen:['Germany','Paraguay','Czechia'], Bren:['Spain','Türkiye','Saudi Arabia'], Patrick:['England','Switzerland','Ghana'], Mick:['Netherlands','Austria','Haiti'] };

function owner(team) { for(const [p,t] of Object.entries(PLAYERS)) if(t.includes(team)) return p; return '—'; }
function normalize(str) { return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/&/g, "and").toLowerCase().trim() : ""; }

function getMatchPoints(s1, s2) {
    if (s1 > s2) return 8;
    if (s1 === s2) return 4;
    return 0;
}

async function fetchLog() {
    try {
        const [mRes, hRes] = await Promise.all([fetch('matches.json?cb=' + Date.now()), fetch('halftime.json?cb=' + Date.now())]);
        const games = await mRes.json();
        const htScores = await hRes.json();
        const htMap = {};
        htScores.forEach(h => htMap[`${normalize(h.home)}-${normalize(h.away)}`] = {ht_home: h.ht_home, ht_away: h.ht_away});

        document.getElementById('matchLog').innerHTML = games.map(g => {
            const hName = g.home, aName = g.away;
            const hPts = getMatchPoints(g.score1, g.score2);
            const aPts = getMatchPoints(g.score2, g.score1);
            
            return `
                <div class="match-cols">
                    <div style="text-align:left;">${hName} vs ${aName}</div>
                    <div class="score-box">${(htMap[`${normalize(hName)}-${normalize(aName)}`]?.ht_home ?? '-')}-${(htMap[`${normalize(hName)}-${normalize(aName)}`]?.ht_away ?? '-')} / ${g.score1}-${g.score2}</div>
                    <div class="owner-text">${owner(hName)}</div>
                    <div>${hPts}</div>
                    <div class="owner-text">${owner(aName)}</div>
                    <div>${aPts}</div>
                </div>`;
        }).join('');
    } catch(e) { document.getElementById('matchLog').innerHTML = "Error loading data."; }
}
fetchLog();
</script>
</body>
</html>
