<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Match Log - World Cup 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --metallic-chassis: linear-gradient(145deg, #a47657 0%, #613b23 25%, #361f11 50%, #7d4f32 75%, #221209 100%);
            --inner-wood-plate: #492817;
            --capsule-bg: linear-gradient(180deg, #241309 0%, #170b04 100%);
            --gold-trim: #ffd294;
            --text-value: #ffd9a3;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background: radial-gradient(circle at 50% 30%, rgba(20, 10, 5, 0.3) 0%, rgba(10, 4, 1, 0.95) 85%),
                        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=2136&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            margin: 0;
            padding: 30px 16px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 900px; }
        
        .luxury-panel {
            background: var(--metallic-chassis);
            border: 2px solid #1a0c05;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        }

        .inner-wood-board {
            background: var(--inner-wood-plate);
            border: 2px solid #28140a;
            border-radius: 6px;
            padding: 24px;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.85);
        }

        .section-title {
            font-family: 'Cinzel', serif;
            text-align: center;
            font-size: 1.35rem;
            color: var(--gold-trim);
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .match-cols {
            display: grid;
            grid-template-columns: 2fr 0.8fr 1fr 0.5fr 1fr 0.5fr;
            align-items: center;
            text-align: center;
            gap: 8px;
            background: var(--capsule-bg);
            border: 1px solid #28140a;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.9);
        }

        .header-row {
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: #bca08d;
            font-size: 0.7rem;
            text-transform: uppercase;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
        }

        .nav-button {
            background: linear-gradient(180deg, #8c5d43 0%, #462a1a 100%);
            border: 1px solid #1a0c05;
            color: #f7dfc1;
            font-family: 'Cinzel', serif;
            padding: 6px 14px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .score-box { font-family: monospace; color: var(--gold-trim); font-weight: bold; font-size: 1.1rem; }
        .owner-text { font-family: 'Cinzel', serif; font-size: 0.8rem; color: #ebd1be; }
        .pts-text { color: var(--text-value); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="luxury-panel">
        <div class="inner-wood-board">
            <a href="index.html" class="nav-button">← Back</a>
            <div class="section-title">Full Match Log</div>
            
            <div class="match-cols header-row">
                <span>Match</span><span>Score</span><span>HT OWNER</span><span>Pts</span><span>AT OWNER</span><span>Pts</span>
            </div>
            
            <div id="matchLog">Loading data...</div>
        </div>
    </div>
</div>

<script>
const PLAYERS = {
  Scully: ["Spain", "USA", "New Zealand"],
  Bren: ["France", "Norway", "Ghana"],
  Mick: ["Austria", "Ivory Coast", "Haiti"]
};

function owner(team) { 
    for(const [p,t] of Object.entries(PLAYERS)) if(t.includes(team)) return p; 
    return '—'; 
}

function getMatchPoints(s1, s2) {
    if (s1 > s2) return 8;
    if (s1 === s2) return 4;
    return 0;
}

async function fetchLog() {
    try {
        const response = await fetch('https://g0lg0tha.github.io/worldcup-pool/matches.json?cb=' + Date.now());
        const games = await response.json();

        document.getElementById('matchLog').innerHTML = games.map(g => {
            const hPts = getMatchPoints(g.score1, g.score2);
            const aPts = getMatchPoints(g.score2, g.score1);
            
            return `
                <div class="match-cols">
                    <div style="text-align:left; font-size:0.9rem;">${g.home} vs ${g.away}</div>
                    <div class="score-box">${g.score1}-${g.score2}</div>
                    <div class="owner-text">${owner(g.home)}</div>
                    <div class="pts-text">${hPts}</div>
                    <div class="owner-text">${owner(g.away)}</div>
                    <div class="pts-text">${aPts}</div>
                </div>`;
        }).join('');
    } catch(e) { 
        document.getElementById('matchLog').innerHTML = "<div style='text-align:center;'>Error loading data.</div>"; 
    }
}
fetchLog();
</script>
</body>
</html>
